{% extends 'ngo/base.html' %}

{% block content %}
<h2>Delete Milestone</h2>

<p>Are you sure you want to delete "{{ milestone.title }}"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>
<a href="{% url 'milestone_list' %}">Cancel</a>
{% endblock %}
